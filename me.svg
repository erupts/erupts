<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 250">
    <style>
        * {
            font-family: 'Courier New', Courier, monospace;
        }

        svg {
            display: block;
            font-size: 10.5em;
            width: 100%;
            height: 250px;
            margin: 0 auto;
        }

        .text {
            fill: none;
            stroke-dasharray: 8%, 29%;
            stroke-width: 5px;
            stroke-dashoffset: 1%;
            animation: march 5.5s infinite linear;
        }

        /* ── Dark theme (default) ── */
        .text:nth-child(1) { stroke: #ffffff; animation-delay: -1s; }
        .text:nth-child(2) { stroke: #eaf1fb; animation-delay: -2s; }
        .text:nth-child(3) { stroke: #00b0ff; animation-delay: -3s; }
        .text:nth-child(4) { stroke: #00b0ff; animation-delay: -4s; }
        .text:nth-child(5) { stroke: #ff007f; animation-delay: -5s; }

        /* ── Light theme overrides ── */
        @media (prefers-color-scheme: light) {
            .text:nth-child(1) { stroke: #0d1117; }
            .text:nth-child(2) { stroke: #1e2a3a; }
            .text:nth-child(3) { stroke: #0078d4; }
            .text:nth-child(4) { stroke: #0078d4; }
            .text:nth-child(5) { stroke: #d6006e; }
        }

        @keyframes march {
            100% { stroke-dashoffset: -35%; }
        }
    </style>

    <symbol id="s-text">
        <text text-anchor="middle" x="50%" y="80%">YuePeng</text>
    </symbol>

    <g class="g-ants">
        <use class="text" href="#s-text"/>
        <use class="text" href="#s-text"/>
        <use class="text" href="#s-text"/>
        <use class="text" href="#s-text"/>
        <use class="text" href="#s-text"/>
    </g>
</svg>
